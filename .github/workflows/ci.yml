name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Validate
        run: npm run validate

      - name: Lint CSS
        run: npx stylelint "assets/css/**/*.css" --allow-empty-input

      - name: Lint JS
        run: npx eslint "scripts/**/*.mjs" "hooks/**/*.mjs" "functions/**/*.js"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Test (E2E)
        run: npx playwright test --config tests/e2e/playwright.config.js

      - name: Dependency audit
        run: npm audit --production

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: optiflow-website:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d -p 8080:80 --name optiflow-ci optiflow-website:ci
          echo "Waiting for container to be healthy..."

      - name: Healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "Container healthy"
              exit 0
            fi
            sleep 1
          done
          echo "Healthcheck failed after 30s"
          docker logs optiflow-ci
          exit 1

      - name: Smoke test routes
        run: |
          ROUTES=("/" "/pricing/" "/contact/" "/demo-booking/" "/robots.txt" "/sitemap.xml" "/manifest.json" "/assets/css/core.css" "/assets/js/core.js")
          FAILED=0
          for route in "${ROUTES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080${route}")
            if [ "$STATUS" = "200" ]; then
              echo "  [OK] $route → $STATUS"
            else
              echo "  [FAIL] $route → $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED route(s) failed"
            exit 1
          fi
          echo "All $(( ${#ROUTES[@]} )) routes passed"

      - name: Verify 404 handling
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/nonexistent/")
          if [ "$STATUS" = "404" ]; then
            echo "[OK] /nonexistent/ → 404"
          else
            echo "[FAIL] /nonexistent/ → $STATUS (expected 404)"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f optiflow-ci
