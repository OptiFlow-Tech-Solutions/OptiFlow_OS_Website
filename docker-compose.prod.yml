# Production Docker Compose — minimal, no Coolify/Traefik labels
# For: Render, Railway, VPS, plain Docker hosts
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build: .
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
        reservations:
          cpus: "0.1"
          memory: "64M"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
