name: build
description: Full build pipeline
steps:
  - id: pre-build
    command: node hooks/pre-build.mjs
    blocking: true
  - id: assemble
    command: node scripts/assemble.mjs
    blocking: true
  - id: validate
    command: node scripts/validate.mjs
    blocking: true
  - id: test
    command: npx playwright test --config tests/e2e/playwright.config.js
    blocking: true
  - id: deploy
    command: npm run deploy
    blocking: false
    depends: [assemble, validate]
