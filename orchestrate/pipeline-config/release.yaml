name: release
description: Production release pipeline
steps:
  - id: pre-build
    command: node hooks/pre-build.mjs
    blocking: true
  - id: build
    command: node scripts/assemble.mjs
    blocking: true
  - id: validate
    command: node scripts/validate.mjs
    blocking: true
  - id: e2e-test
    command: npx playwright test
    blocking: true
  - id: a11y-test
    command: npx playwright test tests/e2e/a11y.spec.js
    blocking: true
    continue-on-error: true
  - id: deploy
    command: echo "Push to main to deploy via Cloudflare Pages"
    blocking: false
    depends: [build, validate, e2e-test]
