name: security
description: Security audit pipeline
steps:
  - id: pre-commit
    command: node hooks/pre-commit.mjs
    blocking: true
  - id: headers-check
    command: echo "Verify CSP, HSTS, XFO headers in netlify.toml and _headers"
    blocking: true
  - id: secrets-scan
    command: echo "Scan for hardcoded secrets and keys"
    blocking: true
  - id: deps-audit
    command: npm audit --audit-level=high
    blocking: true
    continue-on-error: true
