# Apply Phase Pipeline
# Implements tasks from tasks.md following spec deltas
name: apply
description: Execute implementation tasks from the change's tasks.md

steps:
  - id: pre-build
    type: hook
    command: pre-build
    blocking: true
    description: Pre-build validation

  - id: build
    type: command
    command: node scripts/assemble.mjs
    blocking: true
    description: Build the project

  - id: validate
    type: command
    command: node scripts/validate.mjs
    blocking: true
    continueOnError: true
    depends: [build]
    description: Run validation

  - id: lint
    type: command
    command: npx eslint "scripts/**/*.mjs" "orchestrate/**/*.mjs" "hooks/**/*.mjs"
    blocking: false
    continueOnError: true
    depends: [build]
    description: Lint JavaScript files

  - id: test
    type: command
    command: npx playwright test --config tests/e2e/playwright.config.js
    blocking: false
    continueOnError: true
    depends: [build]
    description: Run E2E tests

  - id: theme-audit
    type: hook
    command: theme-change
    blocking: false
    depends: [build]
    description: Audit theme consistency
