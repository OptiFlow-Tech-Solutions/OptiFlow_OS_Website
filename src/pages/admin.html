<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — OptiFlow OS</title>
  <meta name="description" content="OptiFlow OS Admin Dashboard — Secure internal monitoring platform for activity tracking, audit logs, and email delivery oversight across all OptiFlow systems." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/assets/img/OptiFlow.Logo.png" sizes="any" />
  <link rel="stylesheet" href="/assets/css/core.css" />
</head>
<body>
  <div class="admin-body">
    <div class="container">
      <!-- Login -->
      <div class="admin-login visible" id="adminLogin">
        <div class="admin-login-card">
          <div class="admin-login-header">
            <h1>Admin Login</h1>
            <p>OptiFlow OS Internal Dashboard</p>
          </div>
          <div class="admin-error" id="adminError"></div>
          <form id="loginForm" onsubmit="return false;">
            <div class="admin-form-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" />
            </div>
            <div class="admin-form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" onclick="adminLogin()">Sign In</button>
          </form>
        </div>
      </div>

      <!-- Dashboard -->
      <div class="admin-dashboard" id="adminDashboard">
        <div class="admin-dash-header">
          <h1>Dashboard</h1>
          <button class="btn btn-secondary" onclick="adminLogout()">Sign Out</button>
        </div>

        <!-- Stats Grid -->
        <div class="admin-stats-grid" id="adminStatsGrid">
          <div class="admin-stat-card"><span class="admin-stat-num" id="statTotal">--</span><span class="admin-stat-label">Total Submissions</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statToday">--</span><span class="admin-stat-label">Today</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statContact">--</span><span class="admin-stat-label">Contact</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statDemo">--</span><span class="admin-stat-label">Demos</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statNewsletter">--</span><span class="admin-stat-label">Newsletter</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statSubscribers">--</span><span class="admin-stat-label">Subscribers</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statEmailsSent">--</span><span class="admin-stat-label">Emails (7d)</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statEmailsFailed">--</span><span class="admin-stat-label">Failed (7d)</span></div>
          <div class="admin-stat-card"><span class="admin-stat-num" id="statRateLimited">--</span><span class="admin-stat-label">Rate Limited</span></div>
        </div>

        <!-- Tab Bar -->
        <div class="admin-tabs" role="tablist" aria-label="Dashboard sections">
          <button class="admin-tab active" role="tab" aria-selected="true" aria-controls="tab-submissions" data-tab="submissions" onclick="switchTab('submissions')">Submissions</button>
          <button class="admin-tab" role="tab" aria-selected="false" aria-controls="tab-audit" data-tab="audit" onclick="switchTab('audit')">Audit Log</button>
          <button class="admin-tab" role="tab" aria-selected="false" aria-controls="tab-email" data-tab="email" onclick="switchTab('email')">Email Delivery</button>
        </div>

        <!-- Submissions Tab -->
        <div class="admin-tab-panel active" role="tabpanel" id="tab-submissions">
          <div class="admin-filter-bar">
            <input type="text" id="submissionSearch" class="admin-search-input" placeholder="Search submissions..." />
            <select id="formTypeFilter" class="admin-filter-select">
              <option value="">All Forms</option>
              <option value="contact">Contact</option>
              <option value="demo-booking">Demo Booking</option>
              <option value="newsletter">Newsletter</option>
            </select>
            <button class="btn btn-secondary" onclick="exportSubmissions('csv')" style="margin-left:8px">Export CSV</button>
            <button class="btn btn-secondary" onclick="exportSubmissions('json')" style="margin-left:4px">Export JSON</button>
          </div>
          <div class="admin-submission-list" id="submissionList">
            <div class="skeleton skeleton-card"><div class="skeleton-card-inner"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div></div></div>
            <div class="skeleton skeleton-card"><div class="skeleton-card-inner"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div></div></div>
            <div class="skeleton skeleton-card"><div class="skeleton-card-inner"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div></div></div>
          </div>
          <div class="admin-pagination" id="adminPagination" style="display:none;">
            <span id="pageInfo">Page 1 of 1</span>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary btn-sm" id="btnPrev" onclick="goToPage('prev')">Previous</button>
              <button class="btn btn-secondary btn-sm" id="btnNext" onclick="goToPage('next')">Next</button>
            </div>
          </div>
        </div>

        <!-- Audit Log Tab -->
        <div class="admin-tab-panel" role="tabpanel" id="tab-audit">
          <div class="admin-audit-list" id="auditList">
            <div style="display:flex;flex-direction:column;gap:8px">
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
            </div>
          </div>
          <div class="admin-pagination" id="auditPagination" style="display:none;">
            <span id="auditPageInfo">Page 1 of 1</span>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary btn-sm" id="auditBtnPrev" onclick="goToAuditPage('prev')">Previous</button>
              <button class="btn btn-secondary btn-sm" id="auditBtnNext" onclick="goToAuditPage('next')">Next</button>
            </div>
          </div>
        </div>

        <!-- Email Delivery Tab -->
        <div class="admin-tab-panel" role="tabpanel" id="tab-email">
          <div class="admin-email-summary" id="emailSummary">
            <div class="admin-email-stat"><span class="admin-stat-num" id="emailSentCount">--</span><span class="admin-stat-label">Sent This Week</span></div>
            <div class="admin-email-stat"><span class="admin-stat-num" id="emailFailedCount">--</span><span class="admin-stat-label">Failed This Week</span></div>
          </div>
          <div class="admin-email-list" id="emailList">
            <div style="display:flex;flex-direction:column;gap:8px">
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
              <div class="skeleton skeleton-row"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text sm"></div><div class="skeleton skeleton-text xs"></div></div>
            </div>
          </div>
          <div class="admin-pagination" id="emailPagination" style="display:none;">
            <span id="emailPageInfo">Page 1 of 1</span>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary btn-sm" id="emailBtnPrev" onclick="goToEmailPage('prev')">Previous</button>
              <button class="btn btn-secondary btn-sm" id="emailBtnNext" onclick="goToEmailPage('next')">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/core.js" defer></script>
  <script>
    document.getElementById('loginForm').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); adminLogin(); }
    });
  </script>
</body>
</html>
