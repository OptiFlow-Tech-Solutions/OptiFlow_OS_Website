server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # Security headers
    add_header X-Frame-Options             "DENY"          always;
    add_header X-Content-Type-Options      "nosniff"       always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy     "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://plausible.io; img-src 'self' data:; connect-src 'self' https://plausible.io" always;

    # Trailing-slash redirects (match Netlify SPA-friendly URLs)
    rewrite ^/features$              /features/              permanent;
    rewrite ^/pricing$               /pricing/               permanent;
    rewrite ^/faq$                   /faq/                   permanent;
    rewrite ^/newsletter$            /newsletter/            permanent;
    rewrite ^/blog$                  /newsletter/            permanent;
    rewrite ^/contact$               /contact/               permanent;
    rewrite ^/demo-booking$          /demo-booking/          permanent;
    rewrite ^/privacy-policy$        /privacy-policy/        permanent;
    rewrite ^/terms$                 /terms/                 permanent;
    rewrite ^/product-overview$      /product-overview/      permanent;
    rewrite ^/problem-solutions$     /problem-solutions/     permanent;
    rewrite ^/why-optiflow$          /why-optiflow/          permanent;
    rewrite ^/feature-showcase$      /feature-showcase/      permanent;
    rewrite ^/competitive-positioning$ /competitive-positioning/ permanent;

    # Health endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # API proxy placeholder (ready for future backend)
    location /api/ {
        add_header X-API-Status "not-implemented" always;
        return 503 '{"error":"API not configured"}';
    }

    # Static assets with long-lived caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /sw.js {
        expires 1d;
        add_header Cache-Control "public, no-cache";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location /robots.txt {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTML pages — no CDN caching
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
