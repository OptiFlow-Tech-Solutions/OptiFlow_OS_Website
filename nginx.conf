load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server {
        listen 80 default_server;
        server_name _;
        server_tokens off;

        root /usr/share/nginx/html;
        index index.html;

        # Brotli compression
        brotli on;
        brotli_comp_level 6;
        brotli_min_length 256;
        brotli_types
            text/html
            text/css
            text/javascript
            application/javascript
            application/json
            application/xml
            application/xml+rss
            image/svg+xml
            application/wasm;

        # Gzip fallback
        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_min_length 256;
        gzip_types
            text/html
            text/css
            text/javascript
            application/javascript
            application/json
            application/xml
            application/xml+rss
            image/svg+xml
            application/wasm;

        # Trailing-slash redirect for SEO-friendly page URLs
        # Matches single-segment paths and /os/* paths without trailing slash
        if ($request_uri ~ "^/(?!health$)(?!api/)(?!assets/)(os/)?([A-Za-z0-9_-]+)(\?.*)?$") {
            rewrite "^/(os/)?([A-Za-z0-9_-]+)(\?.*)?$" /$1$2/$3 permanent;
        }

        # Legacy /blog → /os/newsletter/
        rewrite ^/blog/?$ /os/newsletter/ permanent;

        # SEO-preserving redirects from old root paths
        rewrite ^/pricing/?$ /os/pricing/ permanent;
        rewrite ^/features/?$ /os/features/ permanent;
        rewrite ^/faq/?$ /os/faq/ permanent;
        rewrite ^/newsletter/?$ /os/newsletter/ permanent;
        rewrite ^/contact/?$ /os/contact/ permanent;
        rewrite ^/demo-booking/?$ /os/demo-booking/ permanent;
        rewrite ^/privacy-policy/?$ /os/privacy-policy/ permanent;
        rewrite ^/terms/?$ /os/terms/ permanent;
        rewrite ^/product-overview/?$ /os/product-overview/ permanent;
        rewrite ^/problem-solutions/?$ /os/problem-solutions/ permanent;
        rewrite ^/why-optiflow/?$ /os/why-optiflow/ permanent;
        rewrite ^/feature-showcase/?$ /os/feature-showcase/ permanent;
        rewrite ^/competitive-positioning/?$ /os/competitive-positioning/ permanent;

        # Health endpoint
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok";
        }

        # API reverse proxy to Django backend
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            client_max_body_size 20M;
            proxy_read_timeout 60s;
        }

        # Django admin
        location /admin/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 20M;
        }

        # Django static files
        location /static/ {
            proxy_pass http://api:8000;
        }

        # React SPA — client-side routing fallback for /os/*
        location /os/ {
            try_files $uri $uri/ /os/index.html =404;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Static assets with long-lived caching
        location /assets/ {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /sw.js {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            expires 1d;
            add_header Cache-Control "public, no-cache";
        }

        location /manifest.json {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }

        location /sitemap.xml {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }

        location /robots.txt {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }

        # HTML pages — no CDN caching
        location / {
            add_header X-Frame-Options             "DENY"          always;
            add_header X-Content-Type-Options      "nosniff"       always;
            add_header X-XSS-Protection            "1; mode=block" always;
            add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
            add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy     "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://plausible.io; img-src 'self' data:; connect-src 'self' https://plausible.io" always;
            try_files $uri $uri/ $uri/index.html =404;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
