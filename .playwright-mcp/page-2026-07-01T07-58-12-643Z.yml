            - img [ref=f4e644]
          - paragraph [ref=f4e646]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f4e647]:
          - button "How quickly can we go live?" [ref=f4e648] [cursor=pointer]:
            - generic [ref=f4e649]: How quickly can we go live?
            - img [ref=f4e651]
          - paragraph [ref=f4e653]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f4e654]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f4e655] [cursor=pointer]:
            - generic [ref=f4e656]: Can it really replace WhatsApp and Excel?
