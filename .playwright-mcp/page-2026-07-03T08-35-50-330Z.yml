        - generic [ref=f73e639]:
          - button "What is OptiFlow OS?" [ref=f73e640] [cursor=pointer]:
            - generic [ref=f73e641]: What is OptiFlow OS?
            - img [ref=f73e643]
          - paragraph [ref=f73e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f73e646]:
          - button "How quickly can we go live?" [ref=f73e647] [cursor=pointer]:
            - generic [ref=f73e648]: How quickly can we go live?
            - img [ref=f73e650]
          - paragraph [ref=f73e652]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f73e653]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f73e654] [cursor=pointer]:
            - generic [ref=f73e655]: Can it really replace WhatsApp and Excel?
            - img [ref=f73e657]
          - paragraph [ref=f73e659]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f73e660]:
          - button "Do you charge per user?" [ref=f73e661] [cursor=pointer]:
            - generic [ref=f73e662]: Do you charge per user?
            - img [ref=f73e664]
          - paragraph [ref=f73e666]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f73e667]:
          - button "Is our business data secure?" [ref=f73e668] [cursor=pointer]:
            - generic [ref=f73e669]: Is our business data secure?
            - img [ref=f73e671]
          - paragraph [ref=f73e673]: Absolutely. Data is encrypted in transit and at rest, hosted on secure cloud infrastructure in India. Role-based access ensures every user sees only what they should. Full audit logs track every action.
