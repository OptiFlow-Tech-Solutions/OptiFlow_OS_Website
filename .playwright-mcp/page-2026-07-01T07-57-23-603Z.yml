            - img [ref=f3e644]
          - paragraph [ref=f3e646]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f3e647]:
          - button "How quickly can we go live?" [ref=f3e648] [cursor=pointer]:
            - generic [ref=f3e649]: How quickly can we go live?
            - img [ref=f3e651]
          - paragraph [ref=f3e653]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f3e654]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f3e655] [cursor=pointer]:
            - generic [ref=f3e656]: Can it really replace WhatsApp and Excel?
            - img [ref=f3e658]
          - paragraph [ref=f3e660]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f3e661]:
          - button "Do you charge per user?" [ref=f3e662] [cursor=pointer]:
            - generic [ref=f3e663]: Do you charge per user?
            - img [ref=f3e665]
          - paragraph [ref=f3e667]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f3e668]:
