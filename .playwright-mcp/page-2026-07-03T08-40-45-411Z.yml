        - generic [ref=f333e639]:
          - button "What is OptiFlow OS?" [ref=f333e640] [cursor=pointer]:
            - generic [ref=f333e641]: What is OptiFlow OS?
            - img [ref=f333e643]
          - paragraph [ref=f333e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f333e646]:
          - button "How quickly can we go live?" [ref=f333e647] [cursor=pointer]:
            - generic [ref=f333e648]: How quickly can we go live?
            - img [ref=f333e650]
          - paragraph [ref=f333e652]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f333e653]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f333e654] [cursor=pointer]:
            - generic [ref=f333e655]: Can it really replace WhatsApp and Excel?
            - img [ref=f333e657]
          - paragraph [ref=f333e659]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f333e660]:
          - button "Do you charge per user?" [ref=f333e661] [cursor=pointer]:
            - generic [ref=f333e662]: Do you charge per user?
            - img [ref=f333e664]
          - paragraph [ref=f333e666]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f333e667]:
          - button "Is our business data secure?" [ref=f333e668] [cursor=pointer]:
            - generic [ref=f333e669]: Is our business data secure?
            - img [ref=f333e671]
          - paragraph [ref=f333e673]: Absolutely. Data is encrypted in transit and at rest, hosted on secure cloud infrastructure in India. Role-based access ensures every user sees only what they should. Full audit logs track every action.
