          - paragraph [ref=f6e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f6e646]:
          - button "How quickly can we go live?" [ref=f6e647] [cursor=pointer]:
            - generic [ref=f6e648]: How quickly can we go live?
            - img [ref=f6e650]
          - paragraph [ref=f6e651]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f6e652]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f6e653] [cursor=pointer]:
            - generic [ref=f6e654]: Can it really replace WhatsApp and Excel?
