            - generic [ref=f10e642]: What is OptiFlow OS?
            - img [ref=f10e644]
          - paragraph [ref=f10e646]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f10e647]:
          - button "How quickly can we go live?" [ref=f10e648] [cursor=pointer]:
            - generic [ref=f10e649]: How quickly can we go live?
            - img [ref=f10e651]
          - paragraph [ref=f10e653]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f10e654]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f10e655] [cursor=pointer]:
            - generic [ref=f10e656]: Can it really replace WhatsApp and Excel?
            - img [ref=f10e658]
          - paragraph [ref=f10e660]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f10e661]:
          - button "Do you charge per user?" [ref=f10e662] [cursor=pointer]:
            - generic [ref=f10e663]: Do you charge per user?
            - img [ref=f10e665]
          - paragraph [ref=f10e667]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f10e668]:
          - button "Is our business data secure?" [ref=f10e669] [cursor=pointer]:
            - generic [ref=f10e670]: Is our business data secure?
            - img [ref=f10e672]
          - paragraph [ref=f10e674]: Absolutely. Data is encrypted in transit and at rest, hosted on secure cloud infrastructure in India. Role-based access ensures every user sees only what they should. Full audit logs track every action.
