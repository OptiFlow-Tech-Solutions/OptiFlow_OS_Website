          - paragraph [ref=f1e646]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f1e647]:
          - button "How quickly can we go live?" [ref=f1e648] [cursor=pointer]:
            - generic [ref=f1e649]: How quickly can we go live?
            - img [ref=f1e651]
          - paragraph [ref=f1e653]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f1e654]:
