      - heading "Frequently Asked Questions" [level=2] [ref=f109e637]
      - generic [ref=f109e638]:
        - generic [ref=f109e639]:
          - button "What is OptiFlow OS?" [ref=f109e640] [cursor=pointer]:
            - generic [ref=f109e641]: What is OptiFlow OS?
            - img [ref=f109e643]
          - paragraph [ref=f109e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f109e646]:
          - button "How quickly can we go live?" [ref=f109e647] [cursor=pointer]:
            - generic [ref=f109e648]: How quickly can we go live?
            - img [ref=f109e650]
          - paragraph [ref=f109e652]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f109e653]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f109e654] [cursor=pointer]:
            - generic [ref=f109e655]: Can it really replace WhatsApp and Excel?
            - img [ref=f109e657]
          - paragraph [ref=f109e659]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f109e660]:
          - button "Do you charge per user?" [ref=f109e661] [cursor=pointer]:
            - generic [ref=f109e662]: Do you charge per user?
            - img [ref=f109e664]
          - paragraph [ref=f109e666]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f109e667]:
          - button "Is our business data secure?" [ref=f109e668] [cursor=pointer]:
            - generic [ref=f109e669]: Is our business data secure?
            - img [ref=f109e671]
          - paragraph [ref=f109e673]: Absolutely. Data is encrypted in transit and at rest, hosted on secure cloud infrastructure in India. Role-based access ensures every user sees only what they should. Full audit logs track every action.
      - link "View All FAQs" [ref=f109e675] [cursor=pointer]:
        - /url: /faq/
