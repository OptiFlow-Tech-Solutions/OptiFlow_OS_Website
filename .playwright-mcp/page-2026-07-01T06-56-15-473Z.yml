            - generic [ref=f9e642]: What is OptiFlow OS?
            - img [ref=f9e644]
          - paragraph [ref=f9e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f9e646]:
          - button "How quickly can we go live?" [ref=f9e647] [cursor=pointer]:
            - generic [ref=f9e648]: How quickly can we go live?
            - img [ref=f9e650]
          - paragraph [ref=f9e651]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f9e652]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f9e653] [cursor=pointer]:
            - generic [ref=f9e654]: Can it really replace WhatsApp and Excel?
            - img [ref=f9e656]
          - paragraph [ref=f9e657]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f9e658]:
          - button "Do you charge per user?" [ref=f9e659] [cursor=pointer]:
            - generic [ref=f9e660]: Do you charge per user?
            - img [ref=f9e662]
          - paragraph [ref=f9e663]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f9e664]:
          - button "Is our business data secure?" [ref=f9e665] [cursor=pointer]:
            - generic [ref=f9e666]: Is our business data secure?
