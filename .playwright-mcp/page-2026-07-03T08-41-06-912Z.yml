      - heading "Frequently Asked Questions" [level=2] [ref=f334e637]
      - generic [ref=f334e638]:
        - generic [ref=f334e639]:
          - button "What is OptiFlow OS?" [ref=f334e640] [cursor=pointer]:
            - generic [ref=f334e641]: What is OptiFlow OS?
            - img [ref=f334e643]
          - paragraph [ref=f334e645]: OptiFlow OS is a Business Operating System built for MSMEs. It replaces WhatsApp, Excel, and manual tracking with one platform that manages tasks, attendance, SOPs, leave, reports, and accountability — giving owners complete visibility from a single dashboard.
        - generic [ref=f334e646]:
          - button "How quickly can we go live?" [ref=f334e647] [cursor=pointer]:
            - generic [ref=f334e648]: How quickly can we go live?
            - img [ref=f334e650]
          - paragraph [ref=f334e652]: Most businesses go live in 2-4 weeks. The platform is designed for fast adoption — no IT team needed, no complex setup. We provide guided onboarding and training for your team.
        - generic [ref=f334e653]:
          - button "Can it really replace WhatsApp and Excel?" [ref=f334e654] [cursor=pointer]:
            - generic [ref=f334e655]: Can it really replace WhatsApp and Excel?
            - img [ref=f334e657]
          - paragraph [ref=f334e659]: Yes. Every task, attendance record, checklist, and approval moves out of WhatsApp groups and spreadsheets into OptiFlow — where it's searchable, trackable, and auditable. Our customers report saving 2-4 hours per manager per day.
        - generic [ref=f334e660]:
          - button "Do you charge per user?" [ref=f334e661] [cursor=pointer]:
            - generic [ref=f334e662]: Do you charge per user?
            - img [ref=f334e664]
          - paragraph [ref=f334e666]: No. OptiFlow has simple, fixed annual pricing based on team size — not per-user charges. No hidden costs, no surprise invoices. Cloud hosting and product updates are included.
        - generic [ref=f334e667]:
          - button "Is our business data secure?" [ref=f334e668] [cursor=pointer]:
            - generic [ref=f334e669]: Is our business data secure?
            - img [ref=f334e671]
          - paragraph [ref=f334e673]: Absolutely. Data is encrypted in transit and at rest, hosted on secure cloud infrastructure in India. Role-based access ensures every user sees only what they should. Full audit logs track every action.
