schema: spec-driven

context: |
  Tech stack: Static HTML + CSS + JavaScript, Node.js build pipeline
  Project: OptiFlow OS marketing website, 12 pages
  Design: Custom design system with light/dark themes
  Hosting: Cloudflare Pages + Netlify
  Domain: optiflow.in

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include affected specs
  tasks:
    - Break tasks into chunks of max 2 hours
  orchestration:
    - Always run pre-build validation before any change
    - Always validate after build
    - Run full E2E tests before production deploy
